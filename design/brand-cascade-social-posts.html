body { background: #F3F3F3; padding: 32px; }
.page-header { text-align: center; max-width: 800px; margin: 0 auto 40px; }
.page-header h1 { font-size: 24px; font-weight: 800; color: var(--bm-eigengrau); }
.page-header p { font-size: 14px; color: var(--bm-muted-gray); margin-top: 4px; }

.social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 1300px; margin: 0 auto; }
.social-item { text-align: center; }
.social-label {
  display: inline-block; padding: 4px 14px; border-radius: 100px;
  font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  background: rgba(18,163,140,0.1); color: var(--bm-teal-accent); margin-bottom: 12px;
}
.social-dimensions { font-size: 12px; color: var(--bm-muted-gray); margin-bottom: 8px; }
.social-frame { display: inline-block; box-shadow: 0 4px 24px rgba(0,0,0,0.12); border-radius: 8px; overflow: hidden; }

@media (max-width: 900px) { .social-grid { grid-template-columns: 1fr; } }
</style>
</head>
